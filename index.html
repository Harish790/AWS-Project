<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Happy Friendship Day! 🎉</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .friendship-card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      padding: 40px;
      text-align: center;
      max-width: 600px;
      animation: slideIn 0.6s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    h1 {
      color: #667eea;
      font-size: 2.5rem;
      margin-bottom: 10px;
      font-weight: bold;
    }
    
    .emoji {
      font-size: 3rem;
      margin: 20px 0;
    }
    
    .friend-photo {
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
      margin: 30px 0;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
      border: 5px solid #667eea;
    }
    
    .message {
      color: #333;
      font-size: 1.2rem;
      line-height: 1.8;
      margin: 20px 0;
    }
    
    .special-text {
      color: #764ba2;
      font-weight: bold;
      font-size: 1.3rem;
    }
    
    .heart {
      color: #ff6b9d;
      animation: heartbeat 1.5s infinite;
    }
    
    @keyframes heartbeat {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.2);
      }
    }
  </style>
</head>
<body>
  <div class="friendship-card">
    <div class="emoji">
      <span class="heart">❤️</span>
      <span>🎂</span>
      <span class="heart">❤️</span>
    </div>
    
    <h1>🎉 HAPPY FRIENDSHIP DAY! 🎉</h1>
    
    <p class="message">
      To my best friend,<br>
      <span class="special-text">Thank you for all the memories and moments we've shared!</span>
    </p>
    
    <!-- Add your best friend's photo here -->
    <img src="bf-photo.jpg" alt="Best Friend Photo" class="friend-photo" />
    
    <p class="message">
      You mean the world to me! 🌟<br>
      Here's to our amazing friendship! 💫<br>
      <a href="https://imgur.com/a/RbqTaxC" target="_blank">View More Photos</a>
    </p>
    
    <div class="emoji">
      <span>✨</span>
      <span>🤝</span>
      <span>✨</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="login.js"></script>
</body>
</html>
